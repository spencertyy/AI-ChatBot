# 工作流名字（会显示在 GitHub 的 Actions 标签页）
name: Build & Push Docker image

# ── 触发条件：什么时候自动跑 ──
on:
  push:
    branches: [main]          # 只在 push 到 main 时触发
    paths-ignore:             # 但这些纯文档改动不触发（省得白构建）
      - "**.md"
      - "docs/**"
  workflow_dispatch:          # 也允许在 Actions 页面手动点「Run workflow」

jobs:
  build-and-push:
    runs-on: ubuntu-latest    # 在 GitHub 提供的 amd64 云主机上跑

    steps:
      # 1. 把仓库代码拉到这台云主机
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 装 QEMU —— 让 amd64 主机能模拟构建 arm64 镜像
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. 启用 buildx（多架构构建器）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 用 Secret 登录 Docker Hub（明文 token 绝不进文件）
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. 多架构构建并推送
      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .                              # Dockerfile 在仓库根
          platforms: linux/amd64,linux/arm64      # 同时构建两种架构
          push: true                              # 构建完直接推
          tags: |                                 # 打两个 tag：
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-chat:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-chat:${{ github.sha }}
          cache-from: type=gha                    # 复用上次构建缓存（提速）
          cache-to: type=gha,mode=max
